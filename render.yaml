services:
  - type: web
    name: pautalia-web
    runtime: node
    plan: free
    region: frankfurt
    branch: main
    autoDeploy: true
    buildCommand: npm ci && npx prisma generate && npm run build
    startCommand: npx next start -H 0.0.0.0 -p $PORT
    healthCheckPath: /
    envVars:
      - key: NODE_ENV
        value: production
      - key: DATABASE_URL
        fromDatabase:
          name: pautalia-db
          property: connectionString
      - key: AUTH_HASH_SECRET
        generateValue: true
      - key: ANALYTICS_EXCLUDED_IPS
        sync: false
      - key: NEXT_PUBLIC_SITE_URL
        value: https://pautalia.com
      - key: PAUTALIA_INVENTORY_SOURCE
        value: database
      - key: PAYLOAD_INTERNAL_URL
        value: https://cms.pautalia.com
      - key: PAYLOAD_PUBLIC_SERVER_URL
        value: https://cms.pautalia.com
      - key: REVALIDATE_SECRET
        sync: false
      - key: ADMIN_USERNAME
        sync: false
      - key: ADMIN_PASSWORD
        sync: false
      - key: RESEND_API_KEY
        sync: false
      - key: EMAIL_FROM
        sync: false
      - key: ADMIN_NOTIFICATION_EMAIL
        sync: false
  - type: web
    name: pautalia-cms
    runtime: node
    plan: free
    region: frankfurt
    branch: main
    autoDeploy: true
    rootDir: cms
    buildCommand: npm ci && npm run build
    startCommand: npm run start -- --port $PORT
    healthCheckPath: /admin
    envVars:
      - key: NODE_ENV
        value: production
      - key: DATABASE_URL
        fromDatabase:
          name: pautalia-db
          property: connectionString
      - key: PAYLOAD_SECRET
        generateValue: true
      - key: PAYLOAD_PUBLIC_SERVER_URL
        value: https://cms.pautalia.com
      - key: REVALIDATE_SECRET
        sync: false

databases:
  - name: pautalia-db
    databaseName: pautalia
    user: pautalia
    region: frankfurt
    postgresMajorVersion: "15"
