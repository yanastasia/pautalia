services:
  - type: web
    name: pautalia
    runtime: node
    plan: free
    branch: main
    autoDeploy: true
    buildCommand: npm ci && npx prisma generate && npm run build
    startCommand: npx next start -H 0.0.0.0 -p $PORT
    healthCheckPath: /
    envVars:
      - key: NODE_ENV
        value: production
      - key: DATABASE_URL
        sync: false
      - key: AUTH_HASH_SECRET
        generateValue: true
      - key: NEXT_PUBLIC_SITE_URL
        sync: false
      - key: PAUTALIA_INVENTORY_SOURCE
        value: static
